<!doctype html>
<html lang="fa" dir="rtl"> 
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f766e" />
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="styles.css?v=6" />
<title>ثبت تردد</title>
<style>
  /* استایل‌های مربوط به انیمیشن دکمه ذخیره */
  #saveProfileBtn {
    transition: all 0.4s ease;
    position: relative;
    font-weight: bold;
    border: none;
    cursor: pointer;
  }

  /* انیمیشن نقطه چین در حال ذخیره */
  .dots::after {
    content: '';
    animation: dots 1.5s infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
    100% { content: ''; }
  }

  /* افکت لرزش ملایم در صورت خطا */
  .shake {
    animation: shake 0.5s;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }
</style>
</head>

<body>
<main class="app">

<p id="onlineBadge" class="status top-status"></p>

<section class="card warning compact-warning">
<strong>هشدار مهم</strong>
<p>
پاک کردن حافظه مرورگر، حذف برنامه یا زدن گزینه Clear data / Clear storage باعث حذف اطلاعات تردد ارسال‌نشده می‌شود.
ادمین سیستم از عدم ارسال یا حذف اطلاعات مطلع خواهد شد و عواقب حذف آن به عهده کاربر است.
</p>
</section>

<section class="card profile-card">
<h2>مشخصات پرسنلی</h2>

<input id="personnelCode" inputmode="numeric" autocomplete="off" placeholder="شماره پرسنلی" />
<input id="firstName" autocomplete="given-name" placeholder="نام" />
<input id="lastName" autocomplete="family-name" placeholder="نام خانوادگی" />

<button id="saveProfileBtn" class="secondary">ذخیره مشخصات</button>
<p id="profileStatus" class="status small-status"></p>
<div id="saveLoading" class="inline-loading"></div>
</section>

<section class="card attendance-card">
<h2>ثبت تردد</h2>

<input id="photoInput" type="file" accept="image/*" capture="user" style="display:none" />

<div class="photo-row">
<img id="photoPreview" class="preview" alt="پیش‌نمایش عکس" style="display:none" />
</div>

<button id="recordBtn" class="primary">ثبت تردد</button>

<p id="captureStatus" class="status small-status"></p>
<div id="recordLoading" class="inline-loading"></div>
</section>

<section class="card status-card">
<h2>وضعیت</h2>

<div class="stats">
<div><span id="pendingCount">0</span><small>ارسال‌نشده</small></div>
<div><span id="sentCount">0</span><small>ارسال‌شده</small></div>
<div><span id="failedCount">0</span><small>ناموفق</small></div>
</div>

<p id="syncStatus" class="status small-status"></p>
</section>

<section class="card records-card">
<h2>ترددهای ثبت شده</h2>
<div id="recordsList" class="records"></div>
</section>

</main>

<script src="app.js?v=31"></script>
</body>
</html>
